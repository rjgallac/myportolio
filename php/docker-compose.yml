version: "3.8"

services:
  php-fpm:
    build: .
    container_name: photography-php
    env_file:
      - .env
    volumes:
      - ..:/var/www/html
      - /var/log/apps/photography:/var/www/html/logs
    networks:
      - photography-network

  nginx:
    image: nginx:alpine
    container_name: photography-nginx
    ports:
      - "83:80"
    volumes:
      - ..:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/log/apps/photography/nginx:/var/log/nginx
    depends_on:
      - php-fpm
    networks:
      - photography-network

# volumes:
#   logs:

networks:
  photography-network:
    driver: bridge
