<!doctype html>
<html lang="en">
    <head>
        <!-- Google tag (gtag.js) -->
        <script
            async
            src="https://www.googletagmanager.com/gtag/js?id=G-46BL1XPLB5"
        ></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag() {
                dataLayer.push(arguments);
            }
            gtag("js", new Date());

            gtag("config", "G-46BL1XPLB5");
        </script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Contact Us - My Portfolio</title>
        <link rel="stylesheet" href="styles.css" />
        <!-- reCAPTCHA v3 -->
        <script src="https://www.google.com/recaptcha/api.js?render=6LcuppMsAAAAAKKhWU1gSclOdEIcONZO_Nsz4gCd"></script>
    </head>
    <body>
        <nav class="navbar">
            <div class="logo">My Portfolio</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>

        <section class="page-header">
            <h1>Contact Us</h1>
        </section>

        <main class="content-section">
            <div class="container">
                <!-- Contact Form -->
                <form id="contactForm" class="contact-form">
                    <h2>Send Me a Message</h2>

                    <div class="form-group">
                        <label for="name">Name *</label>
                        <input
                            type="text"
                            id="name"
                            name="name"
                            required
                            placeholder="Your full name"
                        />
                    </div>

                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            required
                            placeholder="your@email.com"
                        />
                    </div>

                    <div class="form-group">
                        <label for="message">Message *</label>
                        <textarea
                            id="message"
                            name="message"
                            rows="6"
                            required
                            placeholder="Tell me about your photography needs..."
                        ></textarea>
                    </div>

                    <button
                        type="submit"
                        class="btn btn-gold btn-full"
                        id="submitBtn"
                    >
                        Send Message
                    </button>
                    <p
                        id="formMessage"
                        style="margin-top: 1rem; display: none"
                    ></p>
                </form>

                <script>
                    const RECAPTCHA_SITE_KEY =
                        "6LcipkctAAAAAIcFGMhg8G3e30nA5AjPSwrO1WDN";

                    document
                        .getElementById("contactForm")
                        .addEventListener("submit", async function (e) {
                            e.preventDefault();

                            const submitBtn =
                                document.getElementById("submitBtn");
                            const formMessage =
                                document.getElementById("formMessage");

                            // Collect form data
                            const formData = new FormData(this);

                            submitBtn.disabled = true;
                            submitBtn.textContent = "Verifying...";
                            formMessage.style.display = "none";

                            // Track form submission attempt
                            gtag("event", "contact_form_start", {
                                event_category: "Contact",
                                event_label: "form_submission_started",
                            });

                            try {
                                // Get reCAPTCHA token
                                const token = await grecaptcha.execute(
                                    RECAPTCHA_SITE_KEY,
                                    { action: "contact_form" },
                                );
                                formData.append("recaptcha-response", token);

                                const response = await fetch(
                                    "php/send-mail.php",
                                    {
                                        method: "POST",
                                        body: formData,
                                    },
                                );

                                const result = await response.json();

                                if (result.success) {
                                    formMessage.textContent = result.message;
                                    formMessage.style.color = "#28a745";
                                    formMessage.style.display = "block";
                                    this.reset();

                                    // Track successful submission
                                    gtag("event", "contact_form_success", {
                                        event_category: "Contact",
                                        event_label:
                                            "form_submission_successful",
                                    });
                                } else {
                                    formMessage.textContent =
                                        result.error ||
                                        "An error occurred. Please try again.";
                                    formMessage.style.color = "#dc3545";
                                    formMessage.style.display = "block";

                                    // Track failed validation
                                    gtag("event", "contact_form_failure", {
                                        event_category: "Contact",
                                        event_label:
                                            result.error ||
                                            "form_validation_failed",
                                    });
                                }
                            } catch (error) {
                                formMessage.textContent =
                                    "Network error. Please check your connection and try again.";
                                formMessage.style.color = "#dc3545";
                                formMessage.style.display = "block";

                                // Track network error
                                gtag("event", "contact_form_failure", {
                                    event_category: "Contact",
                                    event_label: "network_error",
                                });
                            } finally {
                                submitBtn.disabled = false;
                                submitBtn.textContent = "Send Message";
                            }
                        });

                    // Optional: Handle reCAPTCHA load errors
                    grecaptcha.ready(function () {
                        console.log("reCAPTCHA loaded");
                    });
                </script>
            </div>

            <!-- Optional: Add Google Maps embed here -->
            <!--
        <div class="map-container">
            <iframe src="[Google Maps Embed URL]" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
        --></main>

        <footer>
            <p>&copy; 2026 Luxury Photography. All rights reserved.</p>
        </footer>
    </body>
</html>
